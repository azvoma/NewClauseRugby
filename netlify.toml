# ════════════════════════════════════════════════════════════════
#  The UK Rugby Club Directory — netlify.toml
#  Edge Function: injects Yoast-style SEO per page
#  Redirects: path-based URLs map to SPA (Item 7 — v2 prep)
# ════════════════════════════════════════════════════════════════

[build]
  publish = "."

# Edge function — injects server-side SEO on every HTML request
[[edge_functions]]
  function = "seo"
  path     = "/*"

# ── Hard 301 redirects for legacy .html URLs ────────────────
# These prevent Bing/Google indexing duplicate .html versions
[[redirects]]
  from   = "/club/:slug.html"
  to     = "/club/:slug"
  status = 301
  force  = true

[[redirects]]
  from   = "/:page.html"
  to     = "/:page"
  status = 301
  force  = true

# ── 301 redirects from ?p= query URLs to clean paths ────────
# Collapses duplicate URL versions into the canonical clean path
[[redirects]]
  from   = "/?p=rugby-union"
  to     = "/rugby-union"
  status = 301
  force  = true

[[redirects]]
  from   = "/?p=rugby-league"
  to     = "/rugby-league"
  status = 301
  force  = true

[[redirects]]
  from   = "/?p=businesses"
  to     = "/businesses"
  status = 301
  force  = true

[[redirects]]
  from   = "/?p=about"
  to     = "/about"
  status = 301
  force  = true

[[redirects]]
  from   = "/?p=contact"
  to     = "/contact"
  status = 301
  force  = true

[[redirects]]
  from   = "/?p=register"
  to     = "/register"
  status = 301
  force  = true

[[redirects]]
  from   = "/?p=club/:slug"
  to     = "/club/:slug"
  status = 301
  force  = true

[[redirects]]
  from   = "/?p=region/:name"
  to     = "/region/:name"
  status = 301
  force  = true

[[redirects]]
  from   = "/?p=county/:name"
  to     = "/county/:name"
  status = 301
  force  = true

# ── County pages: /county/:name → SPA ───────────────────────
[[redirects]]
  from   = "/county/:name"
  to     = "/?p=county/:name"
  status = 200

# ── Path-based URL redirects (Item 7) ──────────────────────────
# These clean URLs allow future migration away from hash routing
# and enable Google to index each page as a distinct URL today

# Club profiles: /club/leicester-tigers → SPA with ?p=club/leicester-tigers
[[redirects]]
  from   = "/club/:slug"
  to     = "/?p=club/:slug"
  status = 200

# Region pages: /region/yorkshire → SPA with ?p=region/yorkshire
[[redirects]]
  from   = "/region/:name"
  to     = "/?p=region/:name"
  status = 200

# County pages: /county/yorkshire → SPA with ?p=county/yorkshire  
[[redirects]]
  from   = "/county/:name"
  to     = "/?p=county/:name"
  status = 200

# Directory pages
[[redirects]]
  from   = "/rugby-union"
  to     = "/?p=rugby-union"
  status = 200

[[redirects]]
  from   = "/rugby-league"
  to     = "/?p=rugby-league"
  status = 200

[[redirects]]
  from   = "/businesses"
  to     = "/?p=businesses"
  status = 200

[[redirects]]
  from   = "/register"
  to     = "/?p=register"
  status = 200

[[redirects]]
  from   = "/contact"
  to     = "/?p=contact"
  status = 200

[[redirects]]
  from   = "/about"
  to     = "/?p=about"
  status = 200

[[redirects]]
  from   = "/privacy"
  to     = "/?p=privacy"
  status = 200

[[redirects]]
  from   = "/terms"
  to     = "/?p=terms"
  status = 200

[[redirects]]
  from   = "/cookie-policy"
  to     = "/?p=cookie-policy"
  status = 200

# ── Cache headers ────────────────────────────────────────────────
# Images: long cache (they don't change often)
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

# JS/CSS: cache with revalidation
[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/clubs_data.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# Homepage: never cache (so updates show instantly)
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-store"
